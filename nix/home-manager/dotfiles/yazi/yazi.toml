[mgr]
ratio = [1, 4, 3]
show_hidden = true
sort_dir_first = true

[opener]
play = [
	{ run = "mpv %s", orphan = true, for = "unix" },
  #{ run = '"C:\Program Files\mpv.exe" %s', orphan = true, for = "windows" }
]
edit = [
	{ run = "$EDITOR %s", block = true, for = "unix" },
  #{ run = "%EDITOR% %s", block = true, for = "windows" },
]
viewer = [
  { run = "feh -FZ %s", block = true, for = "unix" },
]

[open]
rules = [
	{ mime = "text/*", use = "edit" },
	{ mime = "video/*", use = "play" },
  { mime = "image/*", use = "viewer" },

	# { mime = "application/json", use = "edit" },
  #{ url = "*.json", use = "edit" },

	# Multiple openers for a single rule
  #{ url = "*.html", use = [ "open", "edit" ] },
]
